tracer-storage = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time", "fs"] }
uuid = { workspace = true }
time = { workspace = true }
